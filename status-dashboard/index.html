<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Status Dashboard</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-4">
	<h1 class="mb-4">Service Status Dashboard</h1>
	<div id="services-list" class="row g-3"></div>
</div>
<script>

function getBadgeColor(status) {
	switch(status) {
		case 'running': return 'bg-success';
		case 'inactive': return 'bg-warning';
		case 'warning': return 'bg-warning';
		case 'failed': return 'bg-danger';
		case 'error': return 'bg-secondary';
		default: return 'bg-secondary';
	}
}

function fetchStatus() {
	fetch('/api/status')
		.then(res => res.json())
		.then(data => {
			const list = document.getElementById('services-list');
			list.innerHTML = '';
			Object.entries(data).forEach(([name, info]) => {
				const card = document.createElement('div');
				card.className = 'col-md-4';
				card.innerHTML = `
					<div class="card h-100">
						<div class="card-header d-flex justify-content-between align-items-center">
							<span>${name}</span>
							<span class="badge ${getBadgeColor(info.status)}">${info.status}</span>
						</div>
						<div class="card-body">
							<pre class="mb-0">${info.description}</pre>
						</div>
					</div>
				`;
				list.appendChild(card);
			});
		})
		.catch(() => {
			document.getElementById('services-list').innerHTML = '<div class="alert alert-danger">Failed to fetch status.</div>';
		});
}

fetchStatus();
setInterval(fetchStatus, 10000); // Refresh every 10s
</script>
</body>
</html>
