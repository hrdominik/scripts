<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Status Dashboard</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
<div class="container py-4" id="main-container">
	<div class="d-flex justify-content-between align-items-center mb-4">
		<h1 class="mb-0">Service Status Dashboard</h1>
		<div class="form-check form-switch">
			<input class="form-check-input" type="checkbox" id="darkModeSwitch">
			<label class="form-check-label" for="darkModeSwitch">Dark mode</label>
		</div>
	</div>
	<div class="mb-3" id="type-filters"></div>
	<div id="services-list"></div>
</div>

<script>
// Configurable API root
const API_ROOT = '/monitoring/api'; // Set window.MONITORING_API_ROOT before this script to override

// Dark mode logic
const mainContainer = document.getElementById('main-container');
const darkModeSwitch = document.getElementById('darkModeSwitch');
function setDarkMode(enabled) {
	if (enabled) {
		document.body.classList.add('bg-dark', 'text-light');
		mainContainer.classList.add('bg-dark', 'text-light');
		localStorage.setItem('monitoringDarkMode', 'true');
	} else {
		document.body.classList.remove('bg-dark', 'text-light');
		mainContainer.classList.remove('bg-dark', 'text-light');
		localStorage.setItem('monitoringDarkMode', 'false');
	}
}
darkModeSwitch.addEventListener('change', (e) => setDarkMode(e.target.checked));
// Initialize from localStorage
if (localStorage.getItem('monitoringDarkMode') === 'true') {
	darkModeSwitch.checked = true;
	setDarkMode(true);
}

function getBadgeColor(status) {
	switch(status) {
		case 'running': return 'bg-success';
		case 'inactive': return 'bg-warning';
		case 'warning': return 'bg-warning';
		case 'failed': return 'bg-danger';
		case 'error': return 'bg-secondary';
		default: return 'bg-secondary';
	}
}

function getTypeIcon(type) {
	switch(type) {
		case 'systemd': return '<i class="fa-solid fa-gears" title="Systemd"></i>';
		case 'docker': return '<i class="fa-brands fa-docker" title="Docker"></i>';
		case 'log': return '<i class="fa-solid fa-file-lines" title="Log"></i>';
		default: return '<i class="fa-solid fa-question" title="Unknown"></i>';
	}
}


let allServices = {};
let activeTypeFilter = 'all';

function renderTypeFilters(types) {
	const filterDiv = document.getElementById('type-filters');
	filterDiv.innerHTML = '';
	const btnGroup = document.createElement('div');
	btnGroup.className = 'btn-group';
	btnGroup.role = 'group';
	// All button
	const allBtn = document.createElement('button');
	allBtn.className = `btn btn-outline-primary${activeTypeFilter === 'all' ? ' active' : ''}`;
	allBtn.textContent = 'All';
	allBtn.onclick = () => { activeTypeFilter = 'all'; renderServices(); renderTypeFilters(types); };
	btnGroup.appendChild(allBtn);
	// Type buttons
	types.forEach(type => {
		const btn = document.createElement('button');
		btn.className = `btn btn-outline-primary${activeTypeFilter === type ? ' active' : ''}`;
		btn.innerHTML = `${getTypeIcon(type)} ${type.charAt(0).toUpperCase() + type.slice(1)}`;
		btn.onclick = () => { activeTypeFilter = type; renderServices(); renderTypeFilters(types); };
		btnGroup.appendChild(btn);
	});
	filterDiv.appendChild(btnGroup);
}


function formatBytes(bytes) {
	if (isNaN(bytes)) return bytes;
	const mb = bytes / (1024 * 1024);
	const mbps = (bytes * 8) / (1000 * 1000);
	return `${mb.toFixed(2)} MB (${mbps.toFixed(2)} Mbps)`;
}

function timeAgo(date) {
	const now = new Date();
	const diffMs = now - date;
	const diffSec = Math.floor(diffMs / 1000);
	const diffMin = Math.floor(diffSec / 60);
	const diffHour = Math.floor(diffMin / 60);
	const diffDay = Math.floor(diffHour / 24);
	if (diffDay > 0) return `${diffDay} day${diffDay > 1 ? 's' : ''} ${diffHour % 24}h ago`;
	if (diffHour > 0) return `${diffHour}h ${diffMin % 60}m ago`;
	if (diffMin > 0) return `${diffMin}m ${diffSec % 60}s ago`;
	return `${diffSec}s ago`;
}

function parseLogDescription(desc) {
	// Example: 2025-09-12 12:56:54 INFO download: 12345678 upload: 87654321 ping: 12
	const dateMatch = desc.match(/(\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2})/);
	const logLevelMatch = desc.match(/\b(INFO|ERROR|WARN|DEBUG|TRACE)\b/);
	let dateStr = dateMatch ? dateMatch[1] : null;
	let logLevel = logLevelMatch ? logLevelMatch[1] : null;
	let rest = desc;
	if (dateStr) rest = rest.replace(dateStr, '').trim();
	if (logLevel) rest = rest.replace(logLevel, '').trim();
	// Key-value pairs
	const kvPairs = {};
	rest.split(/\s+/).forEach(part => {
		const kv = part.split(':');
		if (kv.length === 2) kvPairs[kv[0]] = kv[1];
	});
	// Format download/upload/ping
	let download = kvPairs.download ? formatBytes(Number(kvPairs.download)) : null;
	let upload = kvPairs.upload ? formatBytes(Number(kvPairs.upload)) : null;
	let ping = kvPairs.ping ? `${kvPairs.ping} ms` : null;
	// Build HTML
	let html = '';
	if (dateStr) {
		const dateObj = new Date(dateStr.replace(' ', 'T'));
		html += `<div><strong>Date:</strong> ${dateObj.toLocaleString()} <span class="text-muted">(${timeAgo(dateObj)})</span></div>`;
	}
	if (logLevel) html += `<div><strong>Level:</strong> ${logLevel}</div>`;
	Object.entries(kvPairs).forEach(([k, v]) => {
		if (k === 'download' && download) html += `<div><strong>Download:</strong> ${download}</div>`;
		else if (k === 'upload' && upload) html += `<div><strong>Upload:</strong> ${upload}</div>`;
		else if (k === 'ping' && ping) html += `<div><strong>Ping:</strong> ${ping}</div>`;
		else html += `<div><strong>${k}:</strong> ${v}</div>`;
	});
	return html || `<pre class="mb-0">${desc}</pre>`;
}

function parseSystemdDescription(desc) {
	// Example: Thu 2025-09-11 01:53:54 CEST ...
	const dateMatch = desc.match(/([A-Za-z]{3} \d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2} [A-Z]+)/);
	let dateStr = dateMatch ? dateMatch[0] : null;
	let rest = desc;
	if (dateStr) rest = rest.replace(dateStr, '').trim();
	let html = '';
	if (dateStr) {
		// Try to parse systemd date
		const dateObj = new Date(dateStr.replace(/([A-Za-z]{3}) /, '').replace(' CEST', '').replace(' ', 'T'));
		html += `<div><strong>Date:</strong> ${dateObj.toLocaleString()} <span class="text-muted">(${timeAgo(dateObj)})</span></div>`;
	}
	html += `<pre class="mb-0">${rest}</pre>`;
	return html;
}

function renderServices() {
	const list = document.getElementById('services-list');
	list.innerHTML = '';
	// Group by type
	const grouped = {};
	Object.entries(allServices).forEach(([name, info]) => {
		if (!grouped[info.type]) grouped[info.type] = [];
		grouped[info.type].push({ name, ...info });
	});
	// Sort types
	const types = Object.keys(grouped).sort();
	// Only show filtered type
	const showTypes = activeTypeFilter === 'all' ? types : [activeTypeFilter];
	showTypes.forEach(type => {
		const group = grouped[type];
		if (!group) return;
		// Group header
		const groupHeader = document.createElement('div');
		groupHeader.className = `mt-4 mb-2 fw-bold fs-4 d-flex align-items-center ${darkModeSwitch.checked ? 'text-light' : ''}`;
		groupHeader.innerHTML = `${getTypeIcon(type)} <span class="ms-2">${type.charAt(0).toUpperCase() + type.slice(1)}</span>`;
		list.appendChild(groupHeader);
		// Cards row
		const row = document.createElement('div');
		row.className = 'row g-3';
		group.sort((a, b) => (a.displayName || a.name).localeCompare(b.displayName || b.name));
		group.forEach(info => {
			const card = document.createElement('div');
			card.className = 'col-md-4';
			let descHtml;
			if (info.type === 'log') descHtml = parseLogDescription(info.description);
			else if (info.type === 'systemd') descHtml = parseSystemdDescription(info.description);
			else descHtml = `<pre class="mb-0">${info.description}</pre>`;
			card.innerHTML = `
				<div class="card h-100 ${darkModeSwitch.checked ? 'bg-dark text-light border-light' : ''}">
					<div class="card-header d-flex justify-content-between align-items-center ${darkModeSwitch.checked ? 'bg-dark text-light border-light' : ''}">
						<span>
							${getTypeIcon(info.type)}
							<strong>${info.displayName || info.name}</strong>
							<span class="text-muted small ms-2">(${info.type})</span>
						</span>
						<span class="badge ${getBadgeColor(info.status)}">${info.status}</span>
					</div>
					<div class="card-body ${darkModeSwitch.checked ? 'bg-dark text-light border-light' : ''}">
						${descHtml}
					</div>
				</div>
			`;
			row.appendChild(card);
		});
		list.appendChild(row);
	});
}

function fetchStatus() {
	fetch(`${API_ROOT}/status`)
		.then(res => res.json())
		.then(data => {
			allServices = data;
			renderServices();
			const types = Array.from(new Set(Object.values(data).map(s => s.type))).sort();
			renderTypeFilters(types);
		})
		.catch(() => {
			document.getElementById('services-list').innerHTML = `<div class="alert alert-danger${darkModeSwitch.checked ? ' bg-dark text-light border-light' : ''}">Failed to fetch status.</div>`;
		});
}

fetchStatus();
setInterval(fetchStatus, 10000); // Refresh every 10s
</script>
</body>
</html>
